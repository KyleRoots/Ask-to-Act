kind = "web"
previewPath = "/exec-summary/"
title = "Executive Summary"
version = "1.0.0"
id = "artifacts/exec-summary"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/exec-summary/" ]
localPort = 21146

[services.development]
run = "pnpm --filter @workspace/exec-summary run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exec-summary", "run", "build" ]
publicDir = "artifacts/exec-summary/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21146"
BASE_PATH = "/exec-summary/"
