name: Bug report (from support email)
description: Triage a customer-reported connector bug from the support inbox
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when a support email describes broken or unexpected connector behavior.
        After filing, launch a [Cursor Cloud Agent](https://cursor.com/docs/cloud-agent) on this issue to investigate and open a PR.

  - type: input
    id: reporter-email
    attributes:
      label: Reporter email
      description: Customer email for follow-up when the fix ships
    validations:
      required: true

  - type: input
    id: reporter-name
    attributes:
      label: Reporter name
      description: Optional — from the email signature or portal account

  - type: input
    id: firm
    attributes:
      label: Firm / tenant
      description: Optional — helps scope Bullhorn-specific repro

  - type: input
    id: email-subject
    attributes:
      label: Original email subject
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug (edit the issue title to match)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What the user did, which AI client (ChatGPT, Claude, etc.), and which tool or action failed
      placeholder: |
        1. User asked ChatGPT to search candidates with ...
        2. Connector returned ...
        3. Expected ...
    validations:
      required: true

  - type: textarea
    id: email-body
    attributes:
      label: Original email (paste)
      description: Full text from SUPPORT_EMAIL — keep for audit trail
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Blocker — cannot use connector
        - High — major workflow broken
        - Medium — workaround exists
        - Low — cosmetic / minor
    validations:
      required: true

  - type: checkboxes
    id: agent-ready
    attributes:
      label: Ready for Cloud Agent?
      options:
        - label: Repro steps are clear enough for an agent to start (remove `needs-triage` label when checked)
          required: false
